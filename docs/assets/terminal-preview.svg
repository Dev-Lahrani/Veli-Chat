<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal preview illustration">
  <rect width="1200" height="720" rx="24" fill="#0b1020" />
  <rect x="40" y="40" width="1120" height="640" rx="18" fill="#0f172a" stroke="#1f2937" />
  <rect x="40" y="40" width="1120" height="52" rx="18" fill="#111827" />
  <circle cx="70" cy="66" r="6" fill="#ef4444" />
  <circle cx="90" cy="66" r="6" fill="#f59e0b" />
  <circle cx="110" cy="66" r="6" fill="#22c55e" />
  <text x="140" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#94a3b8">
    veilchat
  </text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" fill="#e2e8f0">
    <text x="80" y="140">$ veil</text>
    <text x="80" y="175">Veli-Chat 0.4.0</text>
    <text x="80" y="210">Start  |  Connect  |  Help</text>
    <text x="80" y="250">Mode: start</text>
    <text x="80" y="285">Invite code ready. Share out-of-band.</text>
    <text x="80" y="330">peer@veil: hello?</text>
    <text x="80" y="365">you@veil: yep. safety number matches.</text>
    <text x="80" y="400">peer@veil: /whois</text>
    <text x="80" y="435">system: safety grid shown (4x4)</text>
    <text x="80" y="480">you@veil: /sendfile contract.pdf</text>
    <text x="80" y="515">system: offer sent. waiting...</text>
    <text x="80" y="560">peer@veil: /save 1</text>
    <text x="80" y="595">system: file saved (mode 0o600)</text>
  </g>
  <rect x="760" y="170" width="360" height="200" rx="14" fill="#0b1220" stroke="#334155" />
  <g transform="translate(790 195)">
    <rect x="0" y="0" width="300" height="24" rx="6" fill="#1f2937" />
    <rect x="0" y="40" width="300" height="24" rx="6" fill="#1f2937" />
    <rect x="0" y="80" width="240" height="24" rx="6" fill="#1f2937" />
    <rect x="0" y="120" width="180" height="24" rx="6" fill="#1f2937" />
  </g>
  <text x="780" y="370" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#94a3b8">
    Illustration. Real output varies by session.
  </text>
</svg>
